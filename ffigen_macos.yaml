name: HidMonitorBindingsSwift
description: |
  Bindings for 'macos/Bindings/HidMonitor.h'
output: "lib/src/macos/hid_monitor_bindings_macos.dart"
language: objc
exclude-all-by-default: true
objc-interfaces:
  include:
    - "HidListenerBindings"
    - "MacOsKeyboardEventType"
    - "MacOsKeyboardEvent"
  module:
    "HidMonitorBindings": "hid_monitor"
    "MacOsKeyboardEventType": "hid_monitor"
    "MacOsKeyboardEvent": "hid_monitor"
headers:
  entry-points:
    - "macos/Bindings/HidMonitor.h"
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
  // ignore_for_file: constant_identifier_names
  // ignore_for_file: no_leading_underscores_for_local_identifiers
  // ignore_for_file: library_private_types_in_public_api
comments:
  style: any
  length: full

